services:
  db:
    image: postgres:15-alpine
    container_name: jit_db
    environment:
      POSTGRES_USER: jit_admin
      POSTGRES_PASSWORD: jit_password
      POSTGRES_DB: jit_db
    ports:
      - "5432:5432"
    volumes:
      - jit_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jit_admin -d jit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jit_backend
    environment:
      DB_HOST: db
      DB_USER: jit_admin
      DB_PASSWORD: jit_password
      DB_NAME: jit_db
      DB_PORT: 5432
      PORT: 8080
      JIT_MASTER_KEY: "a3ZPZE4vM2k5a1lZN0xMZEdjRmNxOWF2YjNSNG1oN1A=" # Valid 32-byte base64 key
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jit_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jit_db_data:
