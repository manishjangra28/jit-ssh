# =====================================================================
# JIT SSH Agent Configuration File
# Default location: /etc/jit-agent/jit-agent.conf
# =====================================================================
# Lines starting with # are comments.
# Format: key = value
# =====================================================================

# -----------------------------------------------------------------
# REQUIRED: Control Plane / Backend IP or URL
# This is the address of your JIT backend server.
# -----------------------------------------------------------------
control_plane_url = http://YOUR_BACKEND_IP:8080/api/v1

# -----------------------------------------------------------------
# REQUIRED: Agent Auth Token
# Obtain this from the JIT Control Plane (Servers -> Tokens).
# -----------------------------------------------------------------
agent_token = 7b594b8e23e9b9bd6b25d4bbe96367bc4f4a6ab490b2d9c81b6399c105df39b9

# -----------------------------------------------------------------
# Agent Identity
# Leave blank on first run — the agent will auto-generate a unique
# ID and write it back here. Do NOT change this after registration.
# -----------------------------------------------------------------
agent_id =

# -----------------------------------------------------------------
# Intervals (seconds)
# -----------------------------------------------------------------
heartbeat_interval_sec = 30
poll_interval_sec      = 15

# -----------------------------------------------------------------
# Logging
# Use "stdout" to print to console (useful for systemd journald).
# Or specify a file path: log_file = /var/log/jit-agent.log
# -----------------------------------------------------------------
log_file = stdout

# -----------------------------------------------------------------
# Tags: key=value pairs sent to the control plane at registration.
# These appear in the Servers view and help identify the server.
# Separate multiple tags with commas.
# -----------------------------------------------------------------
# tags = environment=production,team=devops,region=us-east-1
tags = environment=production
